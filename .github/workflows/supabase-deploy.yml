name: Supabase Migrations Deploy

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - 'supabase/migrations/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Supabase CLI
        run: supabase --version

      - name: Deploy to DEV
        if: github.ref == 'refs/heads/dev'
        env:
          DB_URL_DEV: ${{ secrets.SUPABASE_DB_URL_DEV }}
        run: |
          if [ -z "$DB_URL_DEV" ]; then
            echo "::error::SUPABASE_DB_URL_DEV secret is missing! Go to Repository Settings > Secrets > Actions and add it."
            exit 1
          fi
          supabase db push --db-url "$DB_URL_DEV"
        
      - name: Deploy to PROD
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          DB_URL_PROD: ${{ secrets.SUPABASE_DB_URL_PROD }}
        run: |
          if [ -z "$DB_URL_PROD" ]; then
            echo "::error::SUPABASE_DB_URL_PROD secret is missing! Go to Repository Settings > Secrets > Actions and add it."
            exit 1
          fi
          supabase db push --db-url "$DB_URL_PROD"
